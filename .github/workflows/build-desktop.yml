name: Build desktop artifacts

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  macos-desktop:
    name: macOS desktop artifact
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Test macOS package
        run: swift test --package-path MacOS

      - name: Build macOS release
        run: swift build -c release --package-path MacOS

      - name: Package macOS app
        run: |
          set -euo pipefail
          BUILD_DIR="$(swift build -c release --package-path MacOS --show-bin-path)"
          APP_NAME="NeoRemoteMac"
          APP_BUNDLE="$RUNNER_TEMP/$APP_NAME.app"
          APP_CONTENTS="$APP_BUNDLE/Contents"
          APP_MACOS="$APP_CONTENTS/MacOS"

          rm -rf "$APP_BUNDLE" artifacts
          mkdir -p "$APP_MACOS" artifacts
          cp "$BUILD_DIR/$APP_NAME" "$APP_MACOS/$APP_NAME"
          chmod +x "$APP_MACOS/$APP_NAME"

          printf '%s\n' \
            '<?xml version="1.0" encoding="UTF-8"?>' \
            '<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">' \
            '<plist version="1.0">' \
            '<dict>' \
            '  <key>CFBundleExecutable</key>' \
            "  <string>$APP_NAME</string>" \
            '  <key>CFBundleIdentifier</key>' \
            '  <string>com.neoremote.mac</string>' \
            '  <key>CFBundleName</key>' \
            "  <string>$APP_NAME</string>" \
            '  <key>CFBundlePackageType</key>' \
            '  <string>APPL</string>' \
            '  <key>LSMinimumSystemVersion</key>' \
            '  <string>15.0</string>' \
            '  <key>NSPrincipalClass</key>' \
            '  <string>NSApplication</string>' \
            '</dict>' \
            '</plist>' \
            > "$APP_CONTENTS/Info.plist"

          ditto -c -k --keepParent "$APP_BUNDLE" artifacts/NeoRemoteMac.zip
          unzip -t artifacts/NeoRemoteMac.zip

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: NeoRemoteMac
          path: artifacts/NeoRemoteMac.zip
          if-no-files-found: error
          retention-days: 14

  windows-desktop:
    name: Windows desktop artifact
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Windows receiver
        shell: pwsh
        run: ./Windows/scripts/build_receiver.ps1

      - name: Package Windows receiver
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $receiver = "Windows/build/NeoRemote.WindowsReceiver.exe"
          if (-not (Test-Path $receiver)) {
              throw "Windows receiver artifact not found at $receiver"
          }
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          Compress-Archive -Path $receiver -DestinationPath artifacts/NeoRemoteWindowsReceiver.zip -Force

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: NeoRemoteWindowsReceiver
          path: artifacts/NeoRemoteWindowsReceiver.zip
          if-no-files-found: error
          retention-days: 14
