name: Build mobile artifacts

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  ios-unsigned-ipa:
    name: iOS unsigned IPA
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Archive without signing
        run: |
          set -euo pipefail
          xcodebuild archive \
            -project iOS/NeoRemote.xcodeproj \
            -scheme NeoRemote \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "$RUNNER_TEMP/NeoRemote-unsigned.xcarchive" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=

      - name: Package unsigned IPA
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/NeoRemotePayload/Payload" artifacts
          cp -R "$RUNNER_TEMP/NeoRemote-unsigned.xcarchive/Products/Applications/NeoRemote.app" \
            "$RUNNER_TEMP/NeoRemotePayload/Payload/"
          (
            cd "$RUNNER_TEMP/NeoRemotePayload"
            zip -qry "$GITHUB_WORKSPACE/artifacts/NeoRemote-unsigned.ipa" Payload
          )
          unzip -t artifacts/NeoRemote-unsigned.ipa

      - name: Upload unsigned IPA
        uses: actions/upload-artifact@v4
        with:
          name: NeoRemote-unsigned-ipa
          path: artifacts/NeoRemote-unsigned.ipa
          if-no-files-found: error
          retention-days: 14

  android-release-apk:
    name: Android release-signed APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build unsigned release APK
        working-directory: Android
        run: ./gradlew assembleRelease

      - name: Decode release keystore
        env:
          ANDROID_RELEASE_KEYSTORE_BASE64: ${{ secrets.ANDROID_RELEASE_KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail
          if [ -z "$ANDROID_RELEASE_KEYSTORE_BASE64" ]; then
            echo "ANDROID_RELEASE_KEYSTORE_BASE64 is required for release signing." >&2
            exit 1
          fi
          echo "$ANDROID_RELEASE_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/NeoRemote-release.jks"
          chmod 600 "$RUNNER_TEMP/NeoRemote-release.jks"

      - name: Sign release APK
        env:
          ANDROID_RELEASE_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEYSTORE_PASSWORD }}
          ANDROID_RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_RELEASE_KEY_ALIAS }}
          ANDROID_RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          for secret_name in \
            ANDROID_RELEASE_KEYSTORE_PASSWORD \
            ANDROID_RELEASE_KEY_ALIAS \
            ANDROID_RELEASE_KEY_PASSWORD
          do
            if [ -z "${!secret_name}" ]; then
              echo "$secret_name is required for release signing." >&2
              exit 1
            fi
          done

          APKSIGNER="$ANDROID_HOME/build-tools/$(ls "$ANDROID_HOME/build-tools" | sort -V | tail -1)/apksigner"
          mkdir -p artifacts
          "$APKSIGNER" sign \
            --ks "$RUNNER_TEMP/NeoRemote-release.jks" \
            --ks-key-alias "$ANDROID_RELEASE_KEY_ALIAS" \
            --ks-pass "pass:$ANDROID_RELEASE_KEYSTORE_PASSWORD" \
            --key-pass "pass:$ANDROID_RELEASE_KEY_PASSWORD" \
            --out artifacts/NeoRemote-android-release-signed.apk \
            Android/app/build/outputs/apk/release/app-release-unsigned.apk
          "$APKSIGNER" verify --verbose --print-certs \
            artifacts/NeoRemote-android-release-signed.apk
          unzip -t artifacts/NeoRemote-android-release-signed.apk

      - name: Upload release-signed APK
        uses: actions/upload-artifact@v4
        with:
          name: NeoRemote-android-release-signed-apk
          path: artifacts/NeoRemote-android-release-signed.apk
          if-no-files-found: error
          retention-days: 14
