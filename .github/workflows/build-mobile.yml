name: Build mobile artifacts

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  ios-unsigned-ipa:
    name: iOS unsigned IPA
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Archive without signing
        run: |
          set -euo pipefail
          xcodebuild archive \
            -project iOS/NeoRemote.xcodeproj \
            -scheme NeoRemote \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "$RUNNER_TEMP/NeoRemote-unsigned.xcarchive" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=

      - name: Package unsigned IPA
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/NeoRemotePayload/Payload" artifacts
          cp -R "$RUNNER_TEMP/NeoRemote-unsigned.xcarchive/Products/Applications/NeoRemote.app" \
            "$RUNNER_TEMP/NeoRemotePayload/Payload/"
          (
            cd "$RUNNER_TEMP/NeoRemotePayload"
            zip -qry "$GITHUB_WORKSPACE/artifacts/NeoRemote-unsigned.ipa" Payload
          )
          unzip -t artifacts/NeoRemote-unsigned.ipa

      - name: Upload unsigned IPA
        uses: actions/upload-artifact@v4
        with:
          name: NeoRemote-unsigned-ipa
          path: artifacts/NeoRemote-unsigned.ipa
          if-no-files-found: error
          retention-days: 14

  android-unsigned-apk:
    name: Android unsigned APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build unsigned release APK
        working-directory: Android
        run: ./gradlew assembleRelease

      - name: Collect unsigned APK
        run: |
          set -euo pipefail
          mkdir -p artifacts
          cp Android/app/build/outputs/apk/release/app-release-unsigned.apk \
            artifacts/NeoRemote-android-release-unsigned.apk
          unzip -t artifacts/NeoRemote-android-release-unsigned.apk

      - name: Upload unsigned APK
        uses: actions/upload-artifact@v4
        with:
          name: NeoRemote-android-release-unsigned-apk
          path: artifacts/NeoRemote-android-release-unsigned.apk
          if-no-files-found: error
          retention-days: 14
