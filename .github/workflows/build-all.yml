name: Build all artifacts

on:
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: build-all-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ios-unsigned-ipa:
    name: iOS unsigned IPA
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Archive without signing
        run: |
          set -euo pipefail
          xcodebuild archive \
            -project iOS/NeoRemote.xcodeproj \
            -scheme NeoRemote \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "$RUNNER_TEMP/NeoRemote-unsigned.xcarchive" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=

      - name: Package unsigned IPA
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/NeoRemotePayload/Payload" artifacts
          cp -R "$RUNNER_TEMP/NeoRemote-unsigned.xcarchive/Products/Applications/NeoRemote.app" \
            "$RUNNER_TEMP/NeoRemotePayload/Payload/"
          (
            cd "$RUNNER_TEMP/NeoRemotePayload"
            zip -qry "$GITHUB_WORKSPACE/artifacts/NeoRemote-unsigned.ipa" Payload
          )
          unzip -t artifacts/NeoRemote-unsigned.ipa

      - name: Upload unsigned IPA
        uses: actions/upload-artifact@v4
        with:
          name: NeoRemote-unsigned-ipa
          path: artifacts/NeoRemote-unsigned.ipa
          if-no-files-found: error
          retention-days: 14

  android-release-apk:
    name: Android release-signed APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build unsigned release APK
        working-directory: Android
        run: ./gradlew assembleRelease

      - name: Decode release keystore
        env:
          ANDROID_RELEASE_KEYSTORE_BASE64: ${{ secrets.ANDROID_RELEASE_KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail
          if [ -z "$ANDROID_RELEASE_KEYSTORE_BASE64" ]; then
            echo "ANDROID_RELEASE_KEYSTORE_BASE64 is required for release signing." >&2
            exit 1
          fi
          echo "$ANDROID_RELEASE_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/NeoRemote-release.jks"
          chmod 600 "$RUNNER_TEMP/NeoRemote-release.jks"

      - name: Sign release APK
        env:
          ANDROID_RELEASE_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEYSTORE_PASSWORD }}
          ANDROID_RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_RELEASE_KEY_ALIAS }}
          ANDROID_RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          for secret_name in \
            ANDROID_RELEASE_KEYSTORE_PASSWORD \
            ANDROID_RELEASE_KEY_ALIAS \
            ANDROID_RELEASE_KEY_PASSWORD
          do
            if [ -z "${!secret_name}" ]; then
              echo "$secret_name is required for release signing." >&2
              exit 1
            fi
          done

          APKSIGNER="$ANDROID_HOME/build-tools/$(ls "$ANDROID_HOME/build-tools" | sort -V | tail -1)/apksigner"
          mkdir -p artifacts
          "$APKSIGNER" sign \
            --ks "$RUNNER_TEMP/NeoRemote-release.jks" \
            --ks-key-alias "$ANDROID_RELEASE_KEY_ALIAS" \
            --ks-pass "pass:$ANDROID_RELEASE_KEYSTORE_PASSWORD" \
            --key-pass "pass:$ANDROID_RELEASE_KEY_PASSWORD" \
            --out artifacts/NeoRemote-android-release-signed.apk \
            Android/app/build/outputs/apk/release/app-release-unsigned.apk
          "$APKSIGNER" verify --verbose --print-certs \
            artifacts/NeoRemote-android-release-signed.apk
          unzip -t artifacts/NeoRemote-android-release-signed.apk

      - name: Upload release-signed APK
        uses: actions/upload-artifact@v4
        with:
          name: NeoRemote-android-release-signed-apk
          path: artifacts/NeoRemote-android-release-signed.apk
          if-no-files-found: error
          retention-days: 14

  macos-desktop:
    name: macOS desktop artifact
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Test macOS package
        run: swift test --package-path MacOS

      - name: Build macOS release
        run: swift build -c release --package-path MacOS

      - name: Package macOS app
        run: |
          set -euo pipefail
          BUILD_DIR="$(swift build -c release --package-path MacOS --show-bin-path)"
          APP_NAME="NeoRemoteMac"
          APP_BUNDLE="$RUNNER_TEMP/$APP_NAME.app"
          APP_CONTENTS="$APP_BUNDLE/Contents"
          APP_MACOS="$APP_CONTENTS/MacOS"

          rm -rf "$APP_BUNDLE" artifacts
          mkdir -p "$APP_MACOS" artifacts
          cp "$BUILD_DIR/$APP_NAME" "$APP_MACOS/$APP_NAME"
          chmod +x "$APP_MACOS/$APP_NAME"

          printf '%s\n' \
            '<?xml version="1.0" encoding="UTF-8"?>' \
            '<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">' \
            '<plist version="1.0">' \
            '<dict>' \
            '  <key>CFBundleExecutable</key>' \
            "  <string>$APP_NAME</string>" \
            '  <key>CFBundleIdentifier</key>' \
            '  <string>com.neoremote.mac</string>' \
            '  <key>CFBundleName</key>' \
            "  <string>$APP_NAME</string>" \
            '  <key>CFBundleDisplayName</key>' \
            '  <string>NeoRemote</string>' \
            '  <key>CFBundleShortVersionString</key>' \
            '  <string>1.0</string>' \
            '  <key>CFBundleVersion</key>' \
            '  <string>1</string>' \
            '  <key>CFBundleInfoDictionaryVersion</key>' \
            '  <string>6.0</string>' \
            '  <key>CFBundlePackageType</key>' \
            '  <string>APPL</string>' \
            '  <key>LSMinimumSystemVersion</key>' \
            '  <string>15.0</string>' \
            '  <key>NSPrincipalClass</key>' \
            '  <string>NSApplication</string>' \
            '</dict>' \
            '</plist>' \
            > "$APP_CONTENTS/Info.plist"
          printf "APPL????" > "$APP_CONTENTS/PkgInfo"

          ditto -c -k --keepParent "$APP_BUNDLE" artifacts/NeoRemoteMac.zip
          unzip -t artifacts/NeoRemoteMac.zip

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: NeoRemoteMac
          path: artifacts/NeoRemoteMac.zip
          if-no-files-found: error
          retention-days: 14

  windows-desktop:
    name: Windows desktop artifact
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Windows receiver
        shell: pwsh
        run: ./Windows/scripts/build_receiver.ps1

      - name: Package Windows receiver
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $receiver = "Windows/build/NeoRemote.WindowsReceiver.exe"
          if (-not (Test-Path $receiver)) {
              throw "Windows receiver artifact not found at $receiver"
          }
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          Compress-Archive -Path $receiver -DestinationPath artifacts/NeoRemoteWindowsReceiver.zip -Force

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: NeoRemoteWindowsReceiver
          path: artifacts/NeoRemoteWindowsReceiver.zip
          if-no-files-found: error
          retention-days: 14

  all-artifacts-ready:
    name: All artifacts ready
    runs-on: ubuntu-latest
    needs:
      - ios-unsigned-ipa
      - android-release-apk
      - macos-desktop
      - windows-desktop

    steps:
      - name: Summarize artifacts
        run: |
          {
            echo "## NeoRemote artifacts"
            echo
            echo "- iOS: NeoRemote-unsigned-ipa"
            echo "- Android: NeoRemote-android-release-signed-apk"
            echo "- macOS: NeoRemoteMac"
            echo "- Windows: NeoRemoteWindowsReceiver"
          } >> "$GITHUB_STEP_SUMMARY"
