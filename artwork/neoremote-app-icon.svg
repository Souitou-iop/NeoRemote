<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">NeoRemote App Icon</title>
  <desc id="desc">A vector app icon for NeoRemote showing a phone touchpad connected to a desktop cursor.</desc>
  <defs>
    <linearGradient id="bg" x1="160" y1="96" x2="864" y2="928" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F8FBFF"/>
      <stop offset="0.52" stop-color="#DCEFFF"/>
      <stop offset="1" stop-color="#BFDFFF"/>
    </linearGradient>
    <linearGradient id="pad" x1="292" y1="240" x2="732" y2="768" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.92"/>
      <stop offset="1" stop-color="#D7ECFF" stop-opacity="0.9"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="28" stdDeviation="34" flood-color="#2B6C9E" flood-opacity="0.18"/>
    </filter>
    <filter id="cursorShadow" x="-30%" y="-30%" width="170%" height="170%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#115C9B" flood-opacity="0.22"/>
    </filter>
  </defs>

  <rect width="1024" height="1024" rx="228" fill="url(#bg)"/>

  <g opacity="0.58" fill="none" stroke="#74B7E8" stroke-width="28" stroke-linecap="round">
    <path d="M232 308c52-58 124-92 204-92"/>
    <path d="M792 716c-52 58-124 92-204 92"/>
  </g>

  <g filter="url(#softShadow)">
    <rect x="274" y="190" width="476" height="644" rx="106" fill="url(#pad)"/>
    <rect x="300" y="218" width="424" height="588" rx="82" fill="none" stroke="#FFFFFF" stroke-width="20" opacity="0.85"/>
    <rect x="398" y="246" width="228" height="18" rx="9" fill="#1D2B36" opacity="0.22"/>
  </g>

  <g fill="none" stroke="#1677C6" stroke-linecap="round" stroke-linejoin="round">
    <path d="M386 478c34-44 78-67 126-67 73 0 132 59 132 132 0 48-23 92-67 126" stroke-width="34" opacity="0.7"/>
    <path d="M438 548c18-24 42-36 74-36 38 0 69 31 69 69 0 31-12 56-36 74" stroke-width="28" opacity="0.92"/>
  </g>

  <g filter="url(#cursorShadow)">
    <path d="M560 426l190 395-122-48-64 142-82-37 64-142-118-53 132-257z" fill="#0B1720"/>
    <path d="M584 501l105 218-72-28-55 123-32-14 56-124-70-31 68-144z" fill="#FFFFFF" opacity="0.16"/>
  </g>

  <g fill="#0B1720">
    <circle cx="384" cy="712" r="18" opacity="0.72"/>
    <circle cx="512" cy="712" r="18" opacity="0.72"/>
    <circle cx="640" cy="712" r="18" opacity="0.72"/>
  </g>
</svg>
